<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1419" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>pogo.filter.workshop</title>
    <meta name="description" content="Pokémon GO Suchstring-Generator: hundo-aware Trash & Trade Filter, regionale Karte, Tausch-Buddies." />
    <script>
      // Set document lang from saved locale preference before React mounts so
      // returning visitors don't see a flash of the wrong language attribute.
      try {
        var saved = localStorage.getItem("pogo_filter_locale");
        if (saved) document.documentElement.lang = saved;
      } catch (e) {}
    </script>
  </head>
  <body class="bg-[#0F1419]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
