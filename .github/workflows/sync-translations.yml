name: Sync translations

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch translations from Google Sheet
        run: npm run fetch-translations
      - name: Open PR if locale files changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(i18n): sync translations from spreadsheet"
          branch: chore/sync-translations
          delete-branch: true
          title: "chore(i18n): sync translations from spreadsheet"
          body: |
            Automated translation sync from the published Google Sheet.

            Generated by `.github/workflows/sync-translations.yml` running
            `npm run fetch-translations`.

            Review `src/locales/_meta.json` for warnings (truncation, mojibake).
          add-paths: |
            src/locales/**
