name: Sync meta rankings

on:
  schedule:
    - cron: "43 8 * * *" # daily at 08:43 UTC (offset from other syncs)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch Pokémon stats + moves from pogoapi.net
        run: npm run fetch-meta-rankings
      - name: Regenerate fixture snapshot
        run: npx vite-node scripts/generate-fixtures.mjs
      - name: Commit + push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/meta-rankings.json src/__fixtures__/default-filter-output.json; then
            echo "No meta-ranking changes — skipping commit."
            exit 0
          fi
          git add src/data/meta-rankings.json src/__fixtures__/default-filter-output.json
          git commit -m "chore(meta): sync top-attacker rankings from pogoapi"
          git push
